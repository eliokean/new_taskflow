<div class="dashboard">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>TaskFlow</h1>
      <p>Welcome back! Here's what's happening today.</p>
    </div>
    <button class="btn-new" (click)="openCreateTask()">+ New Task</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <app-stat-card label="Total Tasks" [value]="taskService.total()"     color="purple" icon="tasks" />
    <app-stat-card label="Completed"   [value]="taskService.completed()" color="teal"   icon="check" />
    <app-stat-card label="Overdue"     [value]="taskService.overdue()"   color="orange" icon="alert" />
  </div>

  <!-- Projects + Tasks -->
  <div class="two-col">

    <div class="section">
      <div class="section-header">
        <h2>Projects</h2>
        <button class="btn-add" (click)="openCreateProject()">+</button>
      </div>
      @for (project of taskService.projects(); track project.id) {
        <app-project-item [project]="project" (click)="openEditProject(project)" />
      }
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Recent Tasks</h2>
      </div>
      @for (task of taskService.tasks(); track task.id) {
        <app-task-item [task]="task" (toggle)="onToggle($event)" (click)="openEditTask(task)" />
      }
    </div>

  </div>
</div>

<!-- Modals -->
@if (showTaskModal()) {
  <app-task-modal
    [task]="taskToEdit()"
    [projectName]="preselectedProject()"
    [mode]="taskToEdit() ? 'edit' : 'create'"
    (close)="showTaskModal.set(false)"
  />
}

@if (showProjectModal()) {
  <app-project-modal
    [editProject]="projectToEdit()"
    (close)="showProjectModal.set(false)"
  />
}
