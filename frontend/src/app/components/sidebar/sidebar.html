<nav class="sidebar">

  <!-- Logo en haut (desktop) -->
  <div class="logo-wrap">
    <img src="logo.png" alt="Logo" class="logo-img" />
  </div>

  <!-- Nav items principaux -->
  @for (item of navItems; track item.id) {
    <button
      class="nav-item"
      [title]="item.title"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/' }">

      @if (item.id === 'dashboard') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      }
      @if (item.id === 'tasks') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      }
      @if (item.id === 'projects') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 7h18M3 12h18M3 17h18"/>
        </svg>
      }
      @if (item.id === 'calendar') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
      }
      @if (item.id === 'team') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
      }

      <span class="nav-label">{{ item.title }}</span>
    </button>
  }

  <div class="spacer"></div>

  <!-- Avatar + déconnexion en bas (desktop uniquement) -->
  <div class="bottom-section">

    <!-- Avatar avec initiales → profil -->
    <button
      class="nav-item avatar-btn"
      title="Mon profil"
      routerLink="/profile"
      routerLinkActive="active">
      <div class="avatar">{{ initials() }}</div>
      <span class="nav-label">Profil</span>
    </button>

    <!-- Déconnexion (desktop uniquement) -->
    <button class="nav-item nav-item--logout desktop-only" title="Se déconnecter" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="nav-label">Quitter</span>
    </button>

  </div>

</nav>
