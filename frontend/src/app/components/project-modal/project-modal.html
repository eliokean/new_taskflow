<div class="overlay" [class.visible]="visible()" (click)="dismiss()">
  <div class="modal" [class.visible]="visible()" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h2>{{ editProject ? 'Modifier le projet' : 'Nouveau projet' }}</h2>
      <button class="close-btn" (click)="dismiss()" aria-label="Fermer">
        <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Erreur -->
    @if (errorMsg()) {
      <div class="error-banner">{{ errorMsg() }}</div>
    }

    <!-- Nom du projet -->
    <div class="field">
      <label>Nom du projet</label>
      <input
        type="text"
        [value]="name()"
        (input)="name.set($any($event.target).value)"
        placeholder="Ex : Refonte du site web..."
        class="input-field"
      />
    </div>

    <!-- Description -->
    <div class="field">
      <label>Description <span class="optional">— optionnelle</span></label>
      <textarea
        [value]="description()"
        (input)="description.set($any($event.target).value)"
        placeholder="Décrivez l'objectif du projet..."
        class="input-field textarea"
        rows="3"
      ></textarea>
    </div>

    <!-- Couleur -->
    <div class="field">
      <label>Couleur du projet</label>
      <div class="color-grid">
        @for (c of colors; track c) {
          <button
            class="color-swatch"
            [class.active]="color() === c"
            (click)="color.set(c)"
            [attr.aria-label]="'Couleur ' + c"
          >
            <span class="swatch-dot" [ngClass]="'bg-' + c"></span>
            @if (color() === c) {
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            }
          </button>
        }
      </div>
    </div>

    <!-- Actions -->
    <div class="modal-actions">
      <button class="btn-cancel" (click)="dismiss()" [disabled]="saving()">Annuler</button>
      <button class="btn-save" (click)="save()" [disabled]="saving() || !name().trim()">
        @if (saving()) {
          <span class="spinner"></span>
          {{ editProject ? 'Enregistrement...' : 'Création...' }}
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          {{ editProject ? 'Enregistrer' : 'Créer le projet' }}
        }
      </button>
    </div>

  </div>
</div>
